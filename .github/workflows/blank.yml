name: Test Rust Server 236

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Время работы (минуты)'
        default: '90'
        type: choice
        options:
          - 60
          - 90
          - 120
          - 150

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 155
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download and extract server
        run: |
          echo "⬇️ Скачиваем сервер..."
          curl -L --max-time 900 --retry 3 --progress-bar \
            "https://github.com/fakerplayers/govno1337/releases/download/v1.0/linux236dev.1.zip" \
            -o server.zip 2>&1 | tail -10
          
          mkdir -p server
          unzip -q server.zip -d server/
          SERVER_PATH=$(find server/ -name "RustDedicated" -type f -exec dirname {} \; | head -1)
          echo "SERVER_PATH=$SERVER_PATH" >> $GITHUB_ENV
          echo "📁 Путь: $SERVER_PATH"
      
      - name: Setup SSH key and Portmap tunnel
        env:
          PORTMAP_KEY: ${{ secrets.PORTMAP_KEY }}
        run: |
          echo "🔧 Настраиваем SSH ключ для Portmap.io..."
          
          # Создаём папку .ssh
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Записываем ключ
          echo "$PORTMAP_KEY" > ~/.ssh/portmap_key
          chmod 600 ~/.ssh/portmap_key
          
          # Добавляем хост в known_hosts
          ssh-keyscan -p 32718 fakerplayers-32718.portmap.host >> ~/.ssh/known_hosts 2>/dev/null || \
          ssh-keyscan fakerplayers-32718.portmap.host >> ~/.ssh/known_hosts 2>/dev/null || true
          
          echo "✅ SSH ключ настроен"
      
      - name: Start Rust Server
        run: |
          cd "$SERVER_PATH"
          chmod +x RustDedicated
          
          echo "🚀 Запускаем сервер..."
          ./RustDedicated -batchmode -nographics \
            +server.ip 0.0.0.0 \
            +server.port 28015 \
            +server.queryport 28016 \
            +rcon.port 28017 \
            +rcon.password "test12345" \
            +rcon.web 1 \
            +server.hostname "GitHub Test 236" \
            +server.description "Test server" \
            +server.maxplayers 2 \
            +server.worldsize 1000 \
            +server.seed 12345 \
            +server.level "Barren" \
            +server.saveinterval 600 \
            +server.secure 0 2>&1 | tee server.log &
          
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          
          # Ждём загрузки (6 минут)
          echo "⏳ Ждём загрузку сервера (6 минут)..."
          for i in {1..6}; do
            sleep 60
            echo "⏳ Прошло $i минут..."
            
            if ! ps -p $SERVER_PID > /dev/null; then
              echo "❌ Сервер упал!"
              tail -n 100 server.log
              exit 1
            fi
          done
          
          # Проверяем порт
          echo ""
          echo "=== 🔍 Проверка порта 28015 ==="
          if (echo > /dev/tcp/127.0.0.1/28015) 2>/dev/null; then
            echo "✅ Порт 28015 открыт!"
          else
            echo "❌ Порт 28015 закрыт, ищем другой..."
            ss -tlnp | grep RustDedicated || netstat -tlnp | grep RustDedicated
            exit 1
          fi
      
      - name: Start Portmap SSH tunnel
        run: |
          echo "🌐 Запускаем SSH туннель Portmap.io..."
          echo "Адрес: fakerplayers-32718.portmap.host:32718 -> localhost:28015"
          
          # Запускаем SSH туннель в фоне
          ssh -i ~/.ssh/portmap_key \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ExitOnForwardFailure=yes \
              -p 32718 \
              -R 32718:localhost:28015 \
              -N \
              fakerplayers.rustserver@fakerplayers-32718.portmap.host &
          
          SSH_PID=$!
          echo "SSH PID: $SSH_PID"
          
          # Ждём установки туннеля
          sleep 15
          
          # Проверяем, что SSH жив
          if ps -p $SSH_PID > /dev/null; then
            echo "✅ SSH туннель запущен!"
          else
            echo "❌ SSH упал, пробуем ещё раз..."
            ssh -i ~/.ssh/portmap_key \
                -o StrictHostKeyChecking=no \
                -o UserKnownHostsFile=/dev/null \
                -p 32718 \
                -R 32718:localhost:28015 \
                -N \
                fakerplayers.rustserver@fakerplayers-32718.portmap.host &
            sleep 15
          fi
          
          echo ""
          echo "╔════════════════════════════════════════════════╗"
          echo "║  🎮 SERVER READY FOR CONNECTION                ║"
          echo "╠════════════════════════════════════════════════╣"
          echo "║  Адрес: fakerplayers-32718.portmap.host:32718  ║"
          echo "║  Команда:                                      ║"
          echo "║  client.connect fakerplayers-32718.portmap.host:32718 ║"
          echo "╚════════════════════════════════════════════════╝"
      
      - name: Monitor server
        run: |
          cd "$SERVER_PATH"
          
          DURATION=${{ github.event.inputs.duration || '90' }}
          REMAINING=$((DURATION - 7))
          
          echo "⏱️ Работаем $REMAINING минут..."
          echo "📋 Логи сервера (Ctrl+C чтобы пропустить):"
          
          # Показываем логи 3 минуты
          timeout 180 tail -f server.log 2>/dev/null || sleep 180
          
          # Оставшее время
          REMAINING=$((REMAINING - 3))
          echo ""
          echo "⏱️ Осталось $REMAINING минут, сервер работает..."
          
          for i in $(seq 1 $REMAINING); do
            sleep 60
            if [ $((i % 10)) -eq 0 ]; then
              echo "⏳ Прошло $((7 + 3 + i)) / $DURATION минут"
              # Проверяем процессы
              if ! pgrep -f RustDedicated > /dev/null; then
                echo "❌ Сервер упал!"
                exit 1
              fi
              if ! pgrep -f "ssh.*portmap" > /dev/null; then
                echo "⚠️ SSH туннель упал, перезапускаем..."
                ssh -i ~/.ssh/portmap_key \
                    -o StrictHostKeyChecking=no \
                    -o UserKnownHostsFile=/dev/null \
                    -p 32718 \
                    -R 32718:localhost:28015 \
                    -N \
                    fakerplayers.rustserver@fakerplayers-32718.portmap.host &
              fi
            fi
          done
      
      - name: Cleanup
        if: always()
        run: |
          echo "🛑 Останавливаем..."
          pkill -f RustDedicated 2>/dev/null || true
          pkill -f "ssh.*portmap" 2>/dev/null || true
          echo "✅ Готово!"

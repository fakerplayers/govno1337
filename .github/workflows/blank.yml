name: Test Rust Server 236

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Время работы (минуты)'
        default: '90'
        type: choice
        options:
          - 60
          - 90
          - 120
          - 150

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 155
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download and extract server
        run: |
          echo "⬇️ Скачиваем сервер..."
          curl -L --max-time 900 --retry 3 --progress-bar \
            "https://github.com/fakerplayers/govno1337/releases/download/v1.0/linux236dev.1.zip" \
            -o server.zip 2>&1 | tail -10
          
          mkdir -p server
          unzip -q server.zip -d server/
          SERVER_PATH=$(find server/ -name "RustDedicated" -type f -exec dirname {} \; | head -1)
          echo "SERVER_PATH=$SERVER_PATH" >> $GITHUB_ENV
          echo "📁 Путь: $SERVER_PATH"
      
      - name: Start Rust Server and detect port
        run: |
          cd "$SERVER_PATH"
          chmod +x RustDedicated
          
          echo "🚀 Запускаем сервер на порту 28015..."
          ./RustDedicated -batchmode -nographics \
            +server.ip 0.0.0.0 \
            +server.port 28015 \
            +server.queryport 28016 \
            +rcon.port 28017 \
            +rcon.password "test12345" \
            +rcon.web 1 \
            +server.hostname "GitHub Test 236" \
            +server.description "Test server" \
            +server.maxplayers 2 \
            +server.worldsize 1000 \
            +server.seed 12345 \
            +server.level "Barren" \
            +server.saveinterval 600 \
            +server.secure 0 2>&1 | tee server.log &
          
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          
          # Ждём загрузки (6 минут)
          echo "⏳ Ждём загрузку сервера (6 минут)..."
          for i in {1..6}; do
            sleep 60
            echo "⏳ Прошло $i минут..."
            
            # Проверяем жив ли сервер
            if ! ps -p $SERVER_PID > /dev/null; then
              echo "❌ Сервер упал!"
              tail -n 100 server.log
              exit 1
            fi
          done
          
          echo "✅ Сервер работает 6 минут!"
          
          # Находим реальный порт, который открыл сервер
          echo ""
          echo "=== 🔍 ПОИСК РЕАЛЬНОГО ПОРТА ==="
          
          # Ищем все порты RustDedicated
          PORTS=$(ss -tlnp 2>/dev/null | grep RustDedicated | awk '{print $4}' | cut -d: -f2 | sort -u)
          echo "Найденные порты: $PORTS"
          
          # Ищем игровой порт (не 28016 query, не 28017 rcon)
          GAME_PORT=$(echo "$PORTS" | grep -v -E "28016|28017" | head -1)
          
          if [ -z "$GAME_PORT" ]; then
            echo "❌ Не найден игровой порт!"
            echo "Все порты: $PORTS"
            exit 1
          fi
          
          echo "✅ Игровой порт найден: $GAME_PORT"
          echo "GAME_PORT=$GAME_PORT" >> $GITHUB_ENV
          
          # Проверяем, что порт работает
          echo ""
          echo "Проверка порта $GAME_PORT:"
          (echo > /dev/tcp/127.0.0.1/$GAME_PORT) 2>/dev/null && echo "✅ Порт $GAME_PORT открыт" || echo "❌ Порт закрыт"
      
      - name: Setup FRP tunnel with detected port
        run: |
          cd $GITHUB_WORKSPACE
          
          GAME_PORT=${{ env.GAME_PORT }}
          echo "🌐 Настраиваем FRP для порта $GAME_PORT..."
          
          # Скачиваем FRP
          wget -q https://github.com/fatedier/frp/releases/download/v0.52.3/frp_0.52.3_linux_amd64.tar.gz
          tar -xzf frp_0.52.3_linux_amd64.tar.gz
          cd frp_0.52.3_linux_amd64
          
          # Конфигурация с реальным портом
          cat > frpc.toml << EOF
          serverAddr = "frp.freefrp.net"
          serverPort = 7000
          auth.token = "freefrp.net"
          
          [[proxies]]
          name = "rust_tcp"
          type = "tcp"
          localIP = "127.0.0.1"
          localPort = $GAME_PORT
          remotePort = 28015
          EOF
          
          echo "🚀 Запускаем FRP..."
          ./frpc -c frpc.toml > frpc.log 2>&1 &
          sleep 20
          
          echo "📋 Логи FRP:"
          tail -n 20 frpc.log
          
          # Проверяем успех
          if grep -q "start proxy success" frpc.log; then
            echo "✅ FRP туннель создан!"
          else
            echo "⚠️ Проверь логи выше"
          fi
          
          echo ""
          echo "╔════════════════════════════════════════════════╗"
          echo "║  🎮 SERVER READY FOR CONNECTION                ║"
          echo "╠════════════════════════════════════════════════╣"
          echo "║  Локальный порт: $GAME_PORT                      ║"
          echo "║  Внешний адрес: frp.freefrp.net:28015          ║"
          echo "║  Команда: client.connect frp.freefrp.net:28015 ║"
          echo "╚════════════════════════════════════════════════╝"
      
      - name: Monitor server
        run: |
          cd "$SERVER_PATH"
          
          DURATION=${{ github.event.inputs.duration || '90' }}
          REMAINING=$((DURATION - 8))
          
          echo "⏱️ Работаем $REMAINING минут..."
          
          # Показываем логи 2 минуты
          timeout 120 tail -f server.log 2>/dev/null || sleep 120
          
          # Ждём оставшееся время
          REMAINING=$((REMAINING - 2))
          for i in $(seq 1 $REMAINING); do
            sleep 60
            if [ $((i % 10)) -eq 0 ]; then
              echo "⏳ Прошло $((8 + 2 + i)) / $DURATION минут"
              if ! pgrep -f RustDedicated > /dev/null; then
                echo "❌ Сервер упал!"
                exit 1
              fi
            fi
          done
      
      - name: Cleanup
        if: always()
        run: |
          echo "🛑 Останавливаем..."
          pkill -f RustDedicated 2>/dev/null || true
          pkill -f frpc 2>/dev/null || true
          echo "✅ Готово!"

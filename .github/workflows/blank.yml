name: Test Rust Server 236

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Время работы (минуты)'
        default: '90'
        type: choice
        options:
          - 60
          - 90
          - 120
          - 150

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 155
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download server from Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "⬇️ Скачиваем сервер из Release v1.0..."
          echo "Размер: 1.61 GB, может занять 10-15 минут..."
          
          # Используем curl с токеном и таймаутом
          curl -L \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/octet-stream" \
            --max-time 900 \
            --retry 3 \
            --retry-delay 5 \
            --progress-bar \
            "https://github.com/${{ github.repository }}/releases/download/v1.0/linux236dev.1.zip" \
            -o server.zip 2>&1 | tail -20
          
          # Проверяем результат
          if [ ! -f server.zip ]; then
            echo "❌ Файл не скачался!"
            exit 1
          fi
          
          echo ""
          echo "✅ Скачано:"
          ls -lh server.zip
          file server.zip
          
          # Проверка размера
          SIZE=$(stat -c%s server.zip 2>/dev/null || stat -f%z server.zip)
          echo "📦 Размер: $((SIZE / 1024 / 1024)) MB"
          
          if [ $SIZE -lt 1000000000 ]; then
            echo "❌ Файл слишком маленький!"
            head -c 500 server.zip
            exit 1
          fi
      
      - name: Extract ZIP
        run: |
          echo "📦 Распаковываем..."
          mkdir -p server
          unzip -q server.zip -d server/ || {
            echo "❌ Ошибка распаковки!"
            echo "Содержимое архива:"
            unzip -l server.zip | head -20
            exit 1
          }
          
          echo "✅ Распаковано!"
          
          # Ищем путь
          SERVER_PATH=$(find server/ -name "RustDedicated" -type f -exec dirname {} \; | head -1)
          
          if [ -z "$SERVER_PATH" ]; then
            echo "❌ RustDedicated не найден!"
            echo "Структура:"
            find server/ -type f -name "*" | head -30
            exit 1
          fi
          
          echo "SERVER_PATH=$SERVER_PATH" >> $GITHUB_ENV
          echo "📁 Путь: $SERVER_PATH"
          ls -la "$SERVER_PATH/"
      
      - name: Setup Ngrok
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok -y
          
          ngrok tcp 28015 --authtoken $NGROK_AUTHTOKEN &
          sleep 15
          
          TUNNEL=$(curl -s http://localhost:4040/api/tunnels | grep -o '"public_url":"tcp://[^"]*"' | head -1)
          echo "🎮 $TUNNEL"
      
      - name: Start Server
        run: |
          cd "$SERVER_PATH"
          chmod +x RustDedicated
          
          ./RustDedicated -batchmode -nographics \
            +server.port 28015 \
            +server.queryport 28016 \
            +rcon.port 28017 \
            +rcon.password "test12345" \
            +server.hostname "GitHub Test" \
            +server.maxplayers 2 \
            +server.worldsize 1000 \
            +server.level "Barren" &
          
          sleep 240
          
          if pgrep -f RustDedicated; then
            echo "✅ Сервер работает!"
          else
            echo "❌ Ошибка запуска"
            exit 1
          fi
          
          DURATION=${{ github.event.inputs.duration || '90' }}
          echo "⏱️ $DURATION минут..."
          
          for i in $(seq 1 $DURATION); do
            sleep 60
            [ $((i % 15)) -eq 0 ] && echo "⏳ $i / $DURATION мин"
          done
      
      - name: Cleanup
        if: always()
        run: pkill -f RustDedicated; pkill -f ngrok

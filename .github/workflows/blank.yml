name: Test Rust Server 236

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Время работы (минуты)'
        default: '90'
        type: choice
        options:
          - 60
          - 90
          - 120
          - 150

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 155  # 2.5 часа запас (распаковка + работа)
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract server from ZIP
        run: |
          echo "📦 Начинаем распаковку linux236dev.zip..."
          echo "⏳ Это может занять 5-10 минут из-за размера файла..."
          
          # Создаём папку для сервера
          mkdir -p server
          
          # Распаковываем с прогрессом
          unzip -q linux236dev.zip -d server/ &
          UNZIP_PID=$!
          
          # Показываем прогресс распаковки
          while kill -0 $UNZIP_PID 2>/dev/null; do
            echo "⏳ Распаковка: $(date)..."
            sleep 30
          done
          
          wait $UNZIP_PID
          echo "✅ Распаковка завершена!"
          
          # Ищем папку с сервером (может быть вложенная)
          echo "🔍 Ищем файлы сервера..."
          find server/ -name "RustDedicated" -type f
          
          # Определяем путь к серверу
          if [ -f "server/RustDedicated" ]; then
            SERVER_PATH="server"
          else
            SERVER_PATH=$(find server/ -name "RustDedicated" -type f -exec dirname {} \; | head -1)
          fi
          
          echo "📁 Путь к серверу: $SERVER_PATH"
          ls -la "$SERVER_PATH/"
          
          # Сохраняем путь для следующих шагов
          echo "SERVER_PATH=$SERVER_PATH" >> $GITHUB_ENV
      
      - name: Install Ngrok
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          echo "🔧 Устанавливаем ngrok..."
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok -y
          
          # Запускаем TCP туннель
          ngrok tcp 28015 --authtoken $NGROK_AUTHTOKEN &
          sleep 15
          
          # Получаем адрес
          TUNNEL_URL=$(curl -s http://localhost:4040/api/tunnels | grep -oP '"public_url":"tcp://\K[^"]*')
          echo ""
          echo "╔════════════════════════════════════════════════╗"
          echo "║  🎮 SERVER READY FOR CONNECTION                ║"
          echo "╠════════════════════════════════════════════════╣"
          echo "║  Address: $TUNNEL_URL"
          echo "║  In Rust console: client.connect $TUNNEL_URL"
          echo "╚════════════════════════════════════════════════╝"
      
      - name: Start Rust Server
        run: |
          cd "$SERVER_PATH"
          
          # Права на выполнение
          chmod +x RustDedicated
          chmod +x runds.sh 2>/dev/null || true
          
          echo "🚀 Запускаем сервер..."
          ./RustDedicated -batchmode -nographics \
            +server.port 28015 \
            +server.queryport 28016 \
            +rcon.port 28017 \
            +rcon.password "test12345" \
            +rcon.web 1 \
            +server.hostname "GitHub Test 236" \
            +server.description "Test server for plugins" \
            +server.maxplayers 2 \
            +server.worldsize 1000 \
            +server.seed 12345 \
            +server.level "Barren" \
            +server.saveinterval 600 &
          
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          
          # Ждём загрузки (4 минуты для надёжности)
          echo "⏳ Ждём инициализацию сервера (4 минуты)..."
          sleep 240
          
          # Проверяем, что сервер жив
          if ps -p $SERVER_PID > /dev/null; then
            echo "✅ Сервер запущен успешно!"
          else
            echo "❌ Сервер не запустился"
            tail -n 50 oxide/logs/oxide_*.txt 2>/dev/null || true
            exit 1
          fi
          
          # Проверяем логи Oxide
          echo ""
          echo "=== OXIDE LOGS ==="
          tail -n 30 oxide/logs/oxide_*.txt 2>/dev/null || echo "Логи пока не созданы"
          
          # Показываем адрес ещё раз
          echo ""
          echo "=== 🎮 ИНФОРМАЦИЯ ДЛЯ ПОДКЛЮЧЕНИЯ ==="
          curl -s http://localhost:4040/api/tunnels | grep -o '"public_url":"tcp://[^"]*"'
          echo ""
          
          # Время работы
          DURATION=${{ github.event.inputs.duration || '90' }}
          echo "⏱️ Сервер будет работать $DURATION минут..."
          echo "🎮 Подключайся и тестируй плагин!"
          echo "⚠️ Авто-выключение через $DURATION минут"
          
          # Обратный отсчёт
          for i in $(seq 1 $DURATION); do
            sleep 60
            if [ $((i % 15)) -eq 0 ]; then
              echo "⏳ Прошло $i / $DURATION минут | Осталось: $((DURATION - i)) мин"
            fi
          done
          
          echo "⏰ Время работы истекло"
      
      - name: Stop Server
        if: always()
        run: |
          echo "🛑 Останавливаем сервер..."
          pkill -f RustDedicated 2>/dev/null || true
          pkill -f ngrok 2>/dev/null || true
          echo "✅ Готово!"

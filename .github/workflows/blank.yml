          echo "✅ Ключ готов"

      - name: Start server
        run: |
          cd "$SERVER_PATH"
          chmod +x RustDedicated
          
          ./RustDedicated -batchmode -nographics \
            +server.ip 0.0.0.0 +server.port 28015 +server.queryport 28016 \
            +rcon.port 28017 +rcon.password "test12345" +rcon.web 1 \
            +server.hostname "GitHub Test" +server.maxplayers 10 \
            +server.worldsize 1000 +server.seed 12345 +server.level "Procedural Map" \
            +server.secure 0 &
          
          echo "🚀 Сервер запущен в фоновом режиме."
          echo "⏳ Ждём 4 минуты для первичной загрузки..."
          sleep 240

      - name: Start SSH tunnel with debug
        run: |
          echo "🌐 Запускаем SSH туннель..."
          
          # Запускаем в фоне и пишем лог
          ssh -vvv -i ~/.ssh/portmap_key \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ExitOnForwardFailure=yes \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=3 \
              -N \
              -R 32718:localhost:28015 \
              fakerplayers.rustserver@fakerplayers-32718.portmap.host \
              2>&1 | tee ssh.log &
          
          SSH_PID=$!
          echo "SSH_PID=$SSH_PID" >> $GITHUB_ENV
          
          sleep 15
          
          if ps -p $SSH_PID > /dev/null; then
            echo "✅ SSH процесс запущен (PID: $SSH_PID)"
          else
            echo "❌ SSH упал сразу!"
            cat ssh.log
            exit 1
          fi

          echo "🔍 Проверка перенаправления..."
          if grep -q "Forwarding success" ssh.log; then
            echo "✅ Туннель успешно активирован!"
          else
            echo "⚠️ Логи SSH (последние 20 строк):"
            tail -n 20 ssh.log
          fi
          
          echo "🎮 client.connect fakerplayers-32718.portmap.host:32718"

      - name: Monitor server and tunnel
        run: |
          DURATION=${{ github.event.inputs.duration || 90 }}
          echo "⏱️ Мониторинг на $DURATION минут..."
          
          for i in $(seq 1 $DURATION); do
            sleep 60
            if ! ps -p ${{ env.SSH_PID }} > /dev/null 2>&1; then
              echo "❌ SSH упал на $i минуте!"
              tail -n 30 ssh.log
              exit 1
            fi
            
            if ! pgrep -f RustDedicated > /dev/null; then
              echo "❌ Сервер Rust упал!"
              exit 1
            fi

            if [ $((i % 5)) -eq 0 ]; then
              echo "⏳ Прошло $i / $DURATION минут"
            fi
          done

      - name: Stop
        if: always()
        run: |
          echo "🛑 Остановка..."
          pkill -f RustDedicated || true
          pkill -f ssh || true

name: Test Rust Server 236

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Время работы (минуты)'
        default: '90'
        type: choice
        options:
          - 60
          - 90
          - 120
          - 150

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 155
    
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true  # ← ВАЖНО: скачиваем LFS файлы!
      
      - name: Check ZIP file
        run: |
          echo "🔍 Проверяем файл..."
          ls -lh linux236dev.zip
          file linux236dev.zip
          head -c 100 linux236dev.zip | xxd | head
      
      - name: Extract server from ZIP
        run: |
          echo "📦 Распаковываем linux236dev.zip..."
          
          # Проверяем, что это реальный ZIP, не LFS pointer
          if file linux236dev.zip | grep -q "ASCII text"; then
            echo "❌ Это LFS pointer, а не ZIP файл!"
            echo "Содержимое:"
            cat linux236dev.zip
            exit 1
          fi
          
          mkdir -p server
          unzip -q linux236dev.zip -d server/
          
          echo "✅ Распаковка завершена!"
          ls -la server/
          
          # Ищем путь к серверу
          if [ -f "server/RustDedicated" ]; then
            SERVER_PATH="server"
          else
            SERVER_PATH=$(find server/ -name "RustDedicated" -type f -exec dirname {} \; | head -1)
          fi
          
          echo "SERVER_PATH=$SERVER_PATH" >> $GITHUB_ENV
          echo "📁 Путь: $SERVER_PATH"
      
      - name: Install Ngrok
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok -y
          
          ngrok tcp 28015 --authtoken $NGROK_AUTHTOKEN &
          sleep 15
          
          TUNNEL_URL=$(curl -s http://localhost:4040/api/tunnels | grep -oP '"public_url":"tcp://\K[^"]*')
          echo "🎮 Адрес: $TUNNEL_URL"
          echo "client.connect $TUNNEL_URL"
      
      - name: Start Rust Server
        run: |
          cd "$SERVER_PATH"
          chmod +x RustDedicated
          
          ./RustDedicated -batchmode -nographics \
            +server.port 28015 \
            +server.queryport 28016 \
            +rcon.port 28017 \
            +rcon.password "test12345" \
            +server.hostname "GitHub Test 236" \
            +server.maxplayers 2 \
            +server.worldsize 1000 \
            +server.level "Barren" &
          
          sleep 240
          
          if pgrep -f RustDedicated > /dev/null; then
            echo "✅ Сервер запущен!"
          else
            echo "❌ Ошибка запуска"
            exit 1
          fi
          
          DURATION=${{ github.event.inputs.duration || '90' }}
          echo "⏱️ Работаем $DURATION минут..."
          
          for i in $(seq 1 $DURATION); do
            sleep 60
            [ $((i % 15)) -eq 0 ] && echo "⏳ $i / $DURATION мин"
          done
      
      - name: Cleanup
        if: always()
        run: pkill -f RustDedicated; pkill -f ngrok

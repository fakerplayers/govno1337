name: Test Rust Server 236

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Время работы (минуты)'
        default: '90'

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 155
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download server
        run: |
          curl -L -o server.zip "https://github.com/fakerplayers/govno1337/releases/download/v1.0/linux236dev.1.zip"
          unzip -q server.zip -d server/
          echo "SERVER_PATH=$(find server/ -name RustDedicated -exec dirname {} \;)" >> $GITHUB_ENV

      - name: Setup CloudPub
        env:
          CLOUDPUB_TOKEN: ${{ secrets.CLOUDPUB_TOKEN }}
        run: |
          echo "🔧 Устанавливаем CloudPub..."
          
          wget -q https://cloudpub.ru/download/stable/clo-3.0.1-stable-linux-x86_64.tar.gz -O cloudpub.tar.gz
          tar -xzf cloudpub.tar.gz
          
          CLO_BIN=$(find . -name "clo" | head -1)
          chmod +x "$CLO_BIN"
          mv "$CLO_BIN" cloudpub
          
          echo "✅ CloudPub установлен"
          
          ./cloudpub set token "$CLOUDPUB_TOKEN"

      - name: Start server and UDP tunnel
        run: |
          cd "$SERVER_PATH"
          chmod +x RustDedicated
          
          # Запускаем сервер
          ./RustDedicated -batchmode -nographics \
            +server.ip 0.0.0.0 +server.port 28015 +server.queryport 28016 \
            +rcon.port 28017 +rcon.password "test12345" +rcon.web 1 \
            +server.hostname "Test" +server.maxplayers 2 \
            +server.worldsize 1000 +server.seed 12345 +server.level Barren &
          
          echo "⏳ Ждём 4 минуты..."
          sleep 240
          
          # Запускаем UDP туннель (для Rust игровой порт UDP!)
          echo "🌐 Запускаем CloudPub UDP туннель..."
          $GITHUB_WORKSPACE/cloudpub publish udp 28015 --name rust236 2>&1 | tee cloudpub.log &
          
          sleep 15
          echo "📋 Логи CloudPub:"
          tail -20 cloudpub.log
          
          echo ""
          echo "🎮 Подключайся по адресу из логов выше"
          
          sleep ${{ github.event.inputs.duration || 90 }}m

      - name: Stop
        if: always()
        run: pkill -f RustDedicated; pkill -f cloudpub

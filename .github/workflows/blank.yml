name: Test Rust Server 236

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Время работы (минуты)'
        default: '90'

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 155
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download server
        run: |
          curl -L -o server.zip "https://github.com/fakerplayers/govno1337/releases/download/v1.0/linux236dev.1.zip"
          unzip -q server.zip -d server/
          echo "SERVER_PATH=$(find server/ -name RustDedicated -exec dirname {} \;)" >> $GITHUB_ENV

      - name: Setup CloudPub
        env:
          CLOUDPUB_TOKEN: ${{ secrets.CLOUDPUB_TOKEN }}
        run: |
          echo "🔧 Устанавливаем CloudPub..."
          
          # Скачиваем CLI версию для Linux x86_64
          wget -q https://cloudpub.ru/download/cloudpub-linux-amd64 -O cloudpub
          chmod +x cloudpub
          
          # Авторизация по токену
          ./cloudpub auth "$CLOUDPUB_TOKEN"
          
          echo "✅ CloudPub авторизован"

      - name: Start server and CloudPub tunnel
        run: |
          cd "$SERVER_PATH"
          chmod +x RustDedicated
          
          # Запускаем сервер
          ./RustDedicated -batchmode -nographics \
            +server.ip 0.0.0.0 \
            +server.port 28015 \
            +server.queryport 28016 \
            +rcon.port 28017 \
            +rcon.password "test12345" \
            +rcon.web 1 \
            +server.hostname "Test" \
            +server.maxplayers 2 \
            +server.worldsize 1000 \
            +server.seed 12345 \
            +server.level Barren &
          
          echo "⏳ Ждём 4 минуты..."
          sleep 240
          
          # Запускаем туннель CloudPub для TCP порта 28015
          echo "🌐 Запускаем CloudPub туннель..."
          $GITHUB_WORKSPACE/cloudpub tcp 28015 --name rust236 &
          
          sleep 10
          
          # Получаем адрес (обычно показывается в выводе)
          echo ""
          echo "🎮 Проверь логи выше для адреса подключения"
          echo "Обычно формат: rust236.cloudpub.ru:XXXXX"
          
          # Ждём
          sleep ${{ github.event.inputs.duration || 90 }}m

      - name: Stop
        if: always()
        run: pkill -f RustDedicated; pkill -f cloudpub

name: Test Rust Server 236

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Время работы (минуты)'
        default: '90'
        type: choice
        options:
          - 60
          - 90
          - 120
          - 150

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 155
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download server from Release
        run: |
          echo "⬇️ Скачиваем сервер..."
          curl -L --max-time 900 --retry 3 --progress-bar \
            "https://github.com/fakerplayers/govno1337/releases/download/v1.0/linux236dev.1.zip" \
            -o server.zip 2>&1 | tail -20
          
          ls -lh server.zip
          SIZE=$(stat -c%s server.zip)
          if [ $SIZE -lt 1000000000 ]; then
            echo "❌ Файл слишком маленький!"
            exit 1
          fi
          echo "✅ Скачано: $((SIZE / 1024 / 1024)) MB"
      
      - name: Extract server
        run: |
          mkdir -p server
          unzip -q server.zip -d server/
          SERVER_PATH=$(find server/ -name "RustDedicated" -type f -exec dirname {} \; | head -1)
          echo "SERVER_PATH=$SERVER_PATH" >> $GITHUB_ENV
          echo "📁 Путь: $SERVER_PATH"
      
      - name: Setup FRP tunnel
        run: |
          echo "🔧 Скачиваем FRP..."
          wget -q https://github.com/fatedier/frp/releases/download/v0.52.3/frp_0.52.3_linux_amd64.tar.gz
          tar -xzf frp_0.52.3_linux_amd64.tar.gz
          cd frp_0.52.3_linux_amd64
          
          cat > frpc.toml << 'EOF'
          serverAddr = "frp.freefrp.net"
          serverPort = 7000
          auth.token = "freefrp.net"
          
          [[proxies]]
          name = "rust_tcp"
          type = "tcp"
          localIP = "127.0.0.1"
          localPort = 28015
          remotePort = 28015
          EOF
          
          ./frpc -c frpc.toml > frpc.log 2>&1 &
          sleep 20
          
          echo "📋 Логи FRP:"
          tail -n 10 frpc.log
          
          echo ""
          echo "╔════════════════════════════════════════════════╗"
          echo "║  🎮 TUNNEL READY                               ║"
          echo "╠════════════════════════════════════════════════╣"
          echo "║  Адрес: frp.freefrp.net:28015                  ║"
          echo "╚════════════════════════════════════════════════╝"
      
      - name: Start Rust Server
        run: |
          cd "$SERVER_PATH"
          chmod +x RustDedicated
          
          echo "🚀 Запускаем сервер с внешним IP..."
          # ВАЖНО: +server.ip 0.0.0.0 чтобы принимать внешние подключения!
          ./RustDedicated -batchmode -nographics \
            +server.ip 0.0.0.0 \
            +server.port 28015 \
            +server.queryport 28016 \
            +rcon.port 28017 \
            +rcon.password "test12345" \
            +rcon.web 1 \
            +server.hostname "GitHub Test 236" \
            +server.description "Test server" \
            +server.maxplayers 2 \
            +server.worldsize 1000 \
            +server.seed 12345 \
            +server.level "Barren" \
            +server.saveinterval 600 2>&1 | tee server.log &
          
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          
          # Ждём загрузки (4 минуты)
          echo "⏳ Ждём загрузку сервера (4 минуты)..."
          sleep 240
          
          # Проверяем, что сервер жив
          if ! ps -p $SERVER_PID > /dev/null; then
            echo "❌ Сервер упал!"
            echo "=== ЛОГИ СЕРВЕРА ==="
            tail -n 100 server.log
            exit 1
          fi
          
          echo "✅ Сервер запущен!"
          
          # Проверяем на каком IP слушает
          echo ""
          echo "=== 🔍 ПРОВЕРКА ПОРТОВ ==="
          netstat -tlnp 2>/dev/null | grep 28015 || ss -tlnp | grep 28015 || echo "netstat не доступен"
          
          # Проверяем логи на наличие IP
          echo ""
          echo "=== 📋 ЛОГИ СЕРВЕРА (последние 50 строк) ==="
          tail -n 50 server.log | grep -E "(IP|Steam|Initialized|query|connect|Network)" || tail -n 30 server.log
          
          # Проверяем FRP логи
          echo ""
          echo "=== 📋 ЛОГИ FRP ==="
          tail -n 10 $GITHUB_WORKSPACE/frp_0.52.3_linux_amd64/frpc.log
          
          echo ""
          echo "╔════════════════════════════════════════════════╗"
          echo "║  🎮 SERVER READY FOR CONNECTION                ║"
          echo "╠════════════════════════════════════════════════╣"
          echo "║  Адрес: frp.freefrp.net:28015                  ║"
          echo "║  Команда: client.connect frp.freefrp.net:28015 ║"
          echo "╚════════════════════════════════════════════════╝"
          
          # Показываем логи сервера в реальном времени (первые 5 минут)
          echo ""
          echo "📋 Логи сервера (следим 2 минуты):"
          timeout 120 tail -f server.log || true
          
          DURATION=${{ github.event.inputs.duration || '90' }}
          REMAINING=$((DURATION - 6))  # 6 минут уже прошло
          echo ""
          echo "⏱️ Осталось работать: $REMAINING минут"
          
          # Оставшееся время просто ждём
          for i in $(seq 1 $REMAINING); do
            sleep 60
            if [ $((i % 15)) -eq 0 ]; then
              echo "⏳ Прошло $((6 + i)) / $DURATION минут"
              # Проверяем жив ли сервер
              if ! ps -p $SERVER_PID > /dev/null; then
                echo "❌ Сервер упал!"
                tail -n 50 server.log
                exit 1
              fi
            fi
          done
      
      - name: Final logs and cleanup
        if: always()
        run: |
          echo "=== 📋 ФИНАЛЬНЫЕ ЛОГИ ==="
          if [ -f "$SERVER_PATH/server.log" ]; then
            echo "Последние 100 строк логов сервера:"
            tail -n 100 "$SERVER_PATH/server.log" | grep -E "(Error|Exception|disconnect|connect|Steam|Network)" || tail -n 50 "$SERVER_PATH/server.log"
          fi
          
          echo ""
          echo "🛑 Останавливаем сервер..."
          pkill -f RustDedicated 2>/dev/null || true
          pkill -f frpc 2>/dev/null || true
          echo "✅ Готово!"

name: Test Rust Server 236

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Время работы (минуты)'
        default: '90'
        type: choice
        options:
          - 60
          - 90
          - 120
          - 150

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 155
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download server via GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "⬇️ Получаем ссылку на скачивание через API..."
          
          # Получаем URL для скачивания ассета
          API_URL="https://api.github.com/repos/${{ github.repository }}/releases/assets/"
          
          # Находим ID ассета по имени
          ASSET_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v1.0" | \
            grep -o '"id": [0-9]*' | head -1 | grep -o '[0-9]*')
          
          echo "Asset ID: $ASSET_ID"
          
          # Скачиваем через API (follow redirects)
          curl -L \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/octet-stream" \
            --max-time 900 \
            --retry 3 \
            "https://api.github.com/repos/${{ github.repository }}/releases/assets/${ASSET_ID}" \
            -o server.zip
          
          # Проверяем
          echo ""
          echo "✅ Скачано:"
          ls -lh server.zip
          file server.zip
          
          SIZE=$(stat -c%s server.zip)
          echo "📦 Размер: $((SIZE / 1024 / 1024)) MB"
          
          if [ $SIZE -lt 1000000000 ]; then
            echo "❌ Файл слишком маленький! Содержимое:"
            head -c 200 server.zip
            exit 1
          fi
      
      - name: Extract and run
        run: |
          echo "📦 Распаковываем..."
          mkdir -p server
          unzip -q server.zip -d server/
          
          SERVER_PATH=$(find server/ -name "RustDedicated" -type f -exec dirname {} \; | head -1)
          echo "SERVER_PATH=$SERVER_PATH" >> $GITHUB_ENV
          ls -la "$SERVER_PATH/"
      
      - name: Setup Ngrok
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok -y
          ngrok tcp 28015 --authtoken $NGROK_AUTHTOKEN &
          sleep 15
          echo "🎮 $(curl -s http://localhost:4040/api/tunnels | grep -o 'tcp://[^"]*' | head -1)"
      
      - name: Start Server
        run: |
          cd "$SERVER_PATH"
          chmod +x RustDedicated
          ./RustDedicated -batchmode -nographics \
            +server.port 28015 \
            +server.queryport 28016 \
            +rcon.port 28017 \
            +rcon.password "test12345" \
            +server.hostname "GitHub Test" \
            +server.maxplayers 2 \
            +server.worldsize 1000 \
            +server.level "Barren" &
          sleep 240
          pgrep -f RustDedicated && echo "✅ Работает!" || exit 1
          
          DURATION=${{ github.event.inputs.duration || '90' }}
          for i in $(seq 1 $DURATION); do
            sleep 60
            [ $((i % 15)) -eq 0 ] && echo "⏳ $i / $DURATION мин"
          done
      
      - name: Cleanup
        if: always()
        run: pkill -f RustDedicated; pkill -f ngrok
